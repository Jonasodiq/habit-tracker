service: habit-tracker-api

frameworkVersion: '4'

provider:
  name: aws
  runtime: nodejs18.x
  stage: ${opt:stage, 'dev'}
  region: eu-north-1
  profile: habit-tracker

  iam:
    role: arn:aws:iam::635104184831:role/habit-tracker-backend-dev-eu-north-1-lambdaRole

  environment:
    USERS_TABLE: ${self:custom.usersTable}
    HABITS_TABLE: ${self:custom.habitsTable}
    COMPLETIONS_TABLE: ${self:custom.completionsTable}
    COGNITO_USER_POOL_ID: ${env:COGNITO_USER_POOL_ID}
    COGNITO_CLIENT_ID: ${env:COGNITO_CLIENT_ID}
    INSIGHTS_CACHE_TABLE: ${self:custom.insightsCacheTable}
    ANTHROPIC_API_KEY: ${env:ANTHROPIC_API_KEY}

custom:
  usersTable: habit-tracker-users
  habitsTable: habit-tracker-habits
  completionsTable: habit-tracker-completions
  cognitoArn: arn:aws:cognito-idp:eu-north-1:635104184831:userpool/eu-north-1_tHSuinBiR
  insightsCacheTable: habit-tracker-insights-cache-${self:provider.stage}

functions:
  # --- AUTH ---
  createUser:
    handler: functions/auth/createUser/handler.createUser
    events:
      - http:
          path: /auth/users
          method: post
          cors: true
  login:
    handler: functions/auth/login/handler.login
    events:
      - http:
          path: /auth/login
          method: post
          cors: true
  getUser:
    handler: functions/auth/getUser/handler.getUser
    events:
      - http:
          path: /auth/users/me
          method: get
          cors: true
          authorizer:
            type: COGNITO_USER_POOLS
            arn: ${self:custom.cognitoArn}
  updateUser:
    handler: functions/auth/updateUser/handler.updateUser
    events:
      - http:
          path: /auth/users/me
          method: patch
          cors: true
          authorizer:
            type: COGNITO_USER_POOLS
            arn: ${self:custom.cognitoArn}

  # --- HABITS ---
  createHabit:
    handler: functions/habits/handler.createHabit
    events:
      - http:
          path: /habits
          method: post
          cors: true
          authorizer:
            type: COGNITO_USER_POOLS
            arn: ${self:custom.cognitoArn}

  getHabits:
    handler: functions/habits/handler.getHabits
    events:
      - http:
          path: /habits
          method: get
          cors: true
          authorizer:
            type: COGNITO_USER_POOLS
            arn: ${self:custom.cognitoArn}

  updateHabit:
    handler: functions/habits/handler.updateHabit
    events:
      - http:
          path: /habits/{habitId}
          method: patch
          cors: true
          authorizer:
            type: COGNITO_USER_POOLS
            arn: ${self:custom.cognitoArn}

  deleteHabit:
    handler: functions/habits/handler.deleteHabit
    events:
      - http:
          path: /habits/{habitId}
          method: delete
          cors: true
          authorizer:
            type: COGNITO_USER_POOLS
            arn: ${self:custom.cognitoArn}

  # --- INSIGHTS ---
  getInsights:
    handler: functions/insights/handler.getInsights
    timeout: 30
    events:
      - http:
          path: /insights
          method: get
          cors: true
          authorizer:
            type: COGNITO_USER_POOLS
            arn: ${self:custom.cognitoArn}
  getHabitTips:
    handler: functions/insights/handler.getHabitTips
    timeout: 30
    events:
      - http:
          path: /insights/tips
          method: post
          cors: true
          authorizer:
            type: COGNITO_USER_POOLS
            arn: ${self:custom.cognitoArn}
            # --- STATISTICS ---
  getStatistics:
    handler: functions/statistics/handler.getStatistics
    events:
      - http:
          path: /statistics
          method: get
          cors: true
          authorizer:
            type: COGNITO_USER_POOLS
            arn: ${self:custom.cognitoArn}

  # --- TRACKING ---
  completeHabit:
    handler: functions/tracking/handler.completeHabit
    events:
      - http:
          path: /completions
          method: post
          cors: true
          authorizer:
            type: COGNITO_USER_POOLS
            arn: ${self:custom.cognitoArn}

  getCompletions:
    handler: functions/tracking/handler.getCompletions
    events:
      - http:
          path: /completions
          method: get
          cors: true
          authorizer:
            type: COGNITO_USER_POOLS
            arn: ${self:custom.cognitoArn}

  deleteCompletion:
    handler: functions/tracking/handler.deleteCompletion
    events:
      - http:
          path: /completions/{completionId}
          method: delete
          cors: true
          authorizer:
            type: COGNITO_USER_POOLS
            arn: ${self:custom.cognitoArn}

package:
  exclude:
    - node_modules/**
    - .git/**
    - .env
    - README.md
    - tests/**
    - .vscode/**
    - serverless.yml
    - package-lock.json
    - .DS_Store
  include:
    - functions/**
    - lib/**

resources:
  Resources:
    InsightsCacheTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.insightsCacheTable}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: userId
            AttributeType: S
        KeySchema:
          - AttributeName: userId
            KeyType: HASH
        TimeToLiveSpecification:
          AttributeName: ttl
          Enabled: true

#      Design Choices Summary
#  Choice / Tool                    | Reason / Benefit                                                                      | Source
# ----------------------------------|---------------------------------------------------------------------------------------|------------------------------------------------------------
# Infrastructure as Code (IaC)      | Infrastructure is versioned with code – can be recreated from scratch with one command| AWS IaC guide: https://docs.aws.amazon.com/whitepapers/latest/introduction-devops-aws/infrastructure-as-code.html
# Cognito authorizer in API Gateway | Auth happens before Lambda executes – Lambda is only billed for valid requests        | AWS API Gateway + Cognito: https://docs.aws.amazon.com/apigateway/latest/developerguide/apigateway-integrate-with-cognito.html
# DynamoDB PAY_PER_REQUEST          | Cost-efficient for uneven traffic – pay only for actual usage                         | AWS DynamoDB billing: https://docs.aws.amazon.com/amazondynamodb/latest/developerguide/HowItWorks.ReadWriteCapacityMode.html
# Lambda timeout: 30s for insights  | Claude API calls take longer than default 3s – avoids premature termination           | AWS Lambda timeout: https://docs.aws.amazon.com/lambda/latest/dg/configuration-timeout.html
# Exclude .env from package         | Secrets never reach Lambda package – prevents exposing API keys                       | Serverless docs: https://www.serverless.com/framework/docs/environment-variables